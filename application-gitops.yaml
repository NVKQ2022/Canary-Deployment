apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/NVKQ2022/Canary-Deployment"
    path: gitops/applications/app
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: canary
  syncPolicy:
    automated:
      prune: true
      selfHeal: true