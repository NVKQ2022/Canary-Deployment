apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.app.name }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.argo.spec.source.repoURL }}
    path: {{ .Values.argo.spec.source.path }}
    targetRevision: {{ .Values.argo.spec.source.targetRevision }}
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.app.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true