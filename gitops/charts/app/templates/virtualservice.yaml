apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ .Values.traffic.virtualservice.name }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade #make it install first
spec:
  hosts:
  - "*"
  gateways:
  - {{ .Values.global.gateway.name }}
  http:
  - name: http
    route:
    - destination:
        host: {{ .Values.traffic.service.name }}
        subset: stable
      weight: 100
    - destination:
        host: {{ .Values.traffic.service.name }}
        subset: canary
      weight: 0